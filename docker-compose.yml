services:
  db:
    image: postgres:17-alpine
    network_mode: host
    restart: unless-stopped
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: troque_esta_senha_db
    # Porta 5433 para não colidir com o Postgres interno do OnlyOffice (5432).
    command: ["postgres", "-c", "port=5433"]
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    network_mode: host
    restart: unless-stopped
    # Porta 6380 para não colidir com o Redis interno do OnlyOffice (6379).
    command: ["redis-server", "--port", "6380", "--save", "", "--appendonly", "no"]
    volumes:
      - redis_data:/data

  nextcloud:
    image: nextcloud:33-apache
    network_mode: host
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      POSTGRES_HOST: 127.0.0.1:5433
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: troque_esta_senha_db
      REDIS_HOST: 127.0.0.1
      REDIS_HOST_PORT: "6380"
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: troque_esta_senha_admin
      NEXTCLOUD_TRUSTED_DOMAINS: localhost
      PHP_UPLOAD_LIMIT: 1024M
      PHP_MEMORY_LIMIT: 1024M
    volumes:
      - nextcloud_data:/var/www/html
    # Apache do Nextcloud realocado para 8080 antes do start, para não colidir
    # com o OnlyOffice (que fica na 80). /entrypoint.sh da imagem faz exec "$@"
    # no final, então este bloco roda depois do setup do Nextcloud.
    command:
      - bash
      - -c
      - |
        sed -ri 's/Listen 80/Listen 8080/' /etc/apache2/ports.conf
        sed -ri 's/<VirtualHost \*:80>/<VirtualHost *:8080>/' /etc/apache2/sites-enabled/000-default.conf
        exec apache2-foreground

  onlyoffice:
    image: onlyoffice/documentserver:9.3.1.2
    network_mode: host
    restart: unless-stopped
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: troque_este_segredo_jwt_bem_grande
      JWT_HEADER: Authorization
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_log:/var/log/onlyoffice
      - onlyoffice_lib:/var/lib/onlyoffice

volumes:
  db_data:
  redis_data:
  nextcloud_data:
  onlyoffice_data:
  onlyoffice_log:
  onlyoffice_lib:
