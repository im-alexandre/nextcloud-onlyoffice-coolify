# Compose alternativo só para teste no Docker Desktop Windows/Mac.
# O docker-compose.yml principal usa network_mode: host (Linux).
# No Docker Desktop, host mode fica preso à VM e não expõe no localhost
# do Windows, então aqui usamos bridge + ports + nomes de serviço.
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: troque_esta_senha_db
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - redis_data:/data

  nextcloud:
    image: nextcloud:33-apache
    restart: unless-stopped
    depends_on: [db, redis]
    ports:
      - "8080:80"
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: troque_esta_senha_db
      REDIS_HOST: redis
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: troque_esta_senha_admin
      NEXTCLOUD_TRUSTED_DOMAINS: localhost
      PHP_UPLOAD_LIMIT: 1024M
      PHP_MEMORY_LIMIT: 1024M
    volumes:
      - nextcloud_data:/var/www/html

  onlyoffice:
    image: onlyoffice/documentserver:9.3.1.2
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: troque_este_segredo_jwt_bem_grande
      JWT_HEADER: Authorization
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_log:/var/log/onlyoffice
      - onlyoffice_lib:/var/lib/onlyoffice

volumes:
  db_data:
  redis_data:
  nextcloud_data:
  onlyoffice_data:
  onlyoffice_log:
  onlyoffice_lib:
